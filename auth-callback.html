<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Plukrr - Signing In...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }
    
    .callback-container {
      text-align: center;
      padding: 40px;
    }
    
    .callback-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .logo-text {
      font-size: 34px;
      font-weight: 700;
      color: #ff5b7f;
      font-family: "Nanum Pen Script", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin-bottom: 32px;
    }
    
    /* Loading State */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
    }
    
    .loading-subtext {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* Success State */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    .success-state.active {
      display: flex;
    }
    
    .loading-state.hidden {
      display: none;
    }
    
    .success-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.1) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .success-title {
      font-size: 22px;
      font-weight: 600;
      color: #22c55e;
    }
    
    .success-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
    }
    
    /* Error State */
    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    .error-state.active {
      display: flex;
    }
    
    .error-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    
    .error-title {
      font-size: 22px;
      font-weight: 600;
      color: #ef4444;
    }
    
    .error-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      max-width: 300px;
    }
    
    .btn {
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: #ffffff;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px -5px rgba(59, 130, 246, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <div class="callback-card">
      <div class="logo-text">Plukrr</div>
      
      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <div class="loading-text">Signing you in...</div>
        <div class="loading-subtext">Please wait a moment</div>
      </div>
      
      <!-- Success State -->
      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <div class="success-title">You're in!</div>
        <div class="success-text">
          Successfully signed in. Redirecting you to Plukrr...
        </div>
      </div>
      
      <!-- Error State -->
      <div class="error-state" id="errorState">
        <div class="error-icon">✕</div>
        <div class="error-title">Sign in failed</div>
        <div class="error-text" id="errorText">
          Something went wrong. Please try again.
        </div>
        <button class="btn btn-primary" id="tryAgainBtn">Try Again</button>
      </div>
    </div>
  </div>
  
  <script src="config.js"></script>
  <script src="auth-service.js"></script>
  <script src="trial-service.js"></script>
  <script>
    // Handle auth callback
    document.addEventListener('DOMContentLoaded', async () => {
      const loadingState = document.getElementById('loadingState');
      const successState = document.getElementById('successState');
      const errorState = document.getElementById('errorState');
      const errorText = document.getElementById('errorText');
      const tryAgainBtn = document.getElementById('tryAgainBtn');
      
      tryAgainBtn.addEventListener('click', () => {
        window.location.href = 'auth.html';
      });
      
      try {
        // Process the auth callback
        const result = await AuthService.handleAuthCallback();
        
        if (result.success) {
          // Show success state
          loadingState.classList.add('hidden');
          successState.classList.add('active');
          
          // Start trial for new users
          if (typeof TrialService !== 'undefined') {
            await TrialService.startTrial();
          }
          
          // Redirect to main popup after short delay
          setTimeout(() => {
            window.location.href = 'popup.html';
          }, 1500);
        } else {
          // Show error state
          loadingState.classList.add('hidden');
          errorState.classList.add('active');
          errorText.textContent = result.error || 'Sign in failed. Please try again.';
        }
      } catch (error) {
        console.error('[AuthCallback] Error:', error);
        loadingState.classList.add('hidden');
        errorState.classList.add('active');
        errorText.textContent = 'An unexpected error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
