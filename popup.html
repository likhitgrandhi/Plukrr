<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #1c1c1e;
      color: #ffffff;
    }

    /* Loading State */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
    }

    .loading-screen.hidden {
      display: none;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .main-content {
      display: none;
    }

    .main-content.active {
      display: block;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      color: #ffffff;
    }

    .header .version {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Subscription Badge */
    .sub-badge {
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 600;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sub-badge.trial {
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24;
    }

    .sub-badge.pro {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }

    .sub-badge.pro-plus {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #a78bfa;
    }

    .sub-badge.lifetime {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .sub-badge.expired {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    /* Trial Banner */
    .trial-banner {
      display: none;
      padding: 12px 14px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .trial-banner.active {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .trial-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trial-icon {
      font-size: 16px;
    }

    .trial-text {
      font-size: 12px;
      font-weight: 500;
      color: #fbbf24;
    }

    .trial-days {
      font-weight: 700;
    }

    .btn-upgrade-small {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #1c1c1e;
      background: #fbbf24;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-upgrade-small:hover {
      background: #f59e0b;
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .btn-secondary {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .btn-live-edit {
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: #ffffff;
      border: none;
    }

    .btn-live-edit:hover {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
    }

    /* Pro Feature Lock */
    .btn-secondary.locked {
      position: relative;
    }

    .btn-secondary.locked::after {
      content: 'PRO';
      position: absolute;
      right: 14px;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Button Group */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Status */
    .status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }

    /* Settings Button */
    .btn-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.06);
      border: none;
      padding: 0;
      cursor: pointer;
      font-size: 14px;
      border-radius: 10px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.6);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* Account link */
    .account-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      transition: all 0.15s ease;
    }

    .account-link:hover {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.6);
    }

    .account-link svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 16px 0;
    }
  </style>
