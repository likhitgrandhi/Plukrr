<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --line: #e6e1d9;
      --text: #1f1f1f;
      --muted: #6b6b6b;
      --accent: #ff5b7f;
      --shadow: 0 2px 6px rgba(30, 20, 10, 0.08);
    }

    body {
      width: 360px;
      min-height: 200px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    /* Loading State */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
    }

    .loading-screen.hidden {
      display: none;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0, 0, 0, 0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .main-content {
      display: none;
    }

    .main-content.active {
      display: block;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 700;
      margin: 0;
      color: var(--accent);
      font-family: "Nanum Pen Script", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .header .version {
      font-size: 10px;
      color: #9a9a9a;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Subscription Badge */
    .sub-badge {
      padding: 4px 8px;
      font-size: 9px;
      font-weight: 600;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sub-badge.trial {
      background: #fff2d7;
      border: 1px solid #f3d9a2;
      color: #a86a00;
    }

    .sub-badge.pro {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }

    .sub-badge.pro-plus {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #a78bfa;
    }

    .sub-badge.lifetime {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .sub-badge.expired {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    /* Trial Banner */
    .trial-banner {
      display: none;
      padding: 12px 14px;
      background: #fff7e5;
      border: 1px solid #f1dfb4;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .trial-banner.active {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .trial-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trial-icon {
      font-size: 16px;
    }

    .trial-text {
      font-size: 12px;
      font-weight: 500;
      color: #a86a00;
    }

    .trial-days {
      font-weight: 700;
    }

    .btn-upgrade-small {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #1f1f1f;
      background: #ffd27a;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-upgrade-small:hover {
      background: #ffc353;
    }

    /* Auth Prompt */
    .auth-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
      padding: 26px 10px 18px;
    }

    .auth-prompt.active {
      display: flex;
    }

    .auth-icon {
      font-size: 34px;
      font-weight: 700;
      color: var(--accent);
      font-family: "Nanum Pen Script", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1;
    }

    .auth-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      max-width: 220px;
    }

    .auth-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1f1f1f;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 8px 16px rgba(31, 31, 31, 0.12);
    }

    .auth-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 20px rgba(31, 31, 31, 0.18);
    }

    .auth-button:active {
      transform: translateY(0);
    }

    /* Action Rows */
    .action-btn,
    .account-link {
      width: 100%;
      padding: 12px 14px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.15s ease;
      box-shadow: var(--shadow);
      text-decoration: none;
      font-family: inherit;
    }

    .action-btn:hover,
    .account-link:hover {
      border-color: #d6cec2;
      box-shadow: 0 4px 10px rgba(30, 20, 10, 0.12);
      transform: translateY(-1px);
    }

    .action-btn:active,
    .account-link:active {
      transform: translateY(0);
    }

    .action-btn.locked {
      opacity: 0.8;
    }

    .action-btn.locked .action-right::before {
      content: "PRO";
      background: #f1f1f1;
      color: #6b6b6b;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .action-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .action-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-icon {
      width: 20px;
      height: 20px;
      stroke: #2f2f2f;
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .action-icon.filled {
      stroke: none;
      fill: #2f2f2f;
    }

    .action-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9b9b9b;
    }

    .action-pill {
      background: #f1f1f1;
      color: #6b6b6b;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .action-chevron {
      display: none;
    }

    .action-help-icon {
      width: 18px;
      height: 18px;
      stroke: #9b9b9b;
      fill: none;
      stroke-width: 2;
    }

    /* Button Group */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Status */
    .status {
      font-size: 12px;
      color: var(--muted);
      text-align: left;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* Settings Button */
    .btn-icon {
      width: 34px;
      height: 34px;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 0;
      cursor: pointer;
      font-size: 14px;
      border-radius: 10px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b6b6b;
      box-shadow: var(--shadow);
    }

    .btn-icon:hover {
      border-color: #d6cec2;
      color: #3b3b3b;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
