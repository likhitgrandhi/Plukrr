<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Plukrr - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --line: #e8e4de;
      --line-hover: #d6cec2;
      --text: #1a1714;
      --muted: #8a857d;
      --accent: #ff5b7f;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 56px 16px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 380px;
      padding: 0;
    }
    
    .auth-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
    }
    
    .logo {
      text-align: left;
      margin-bottom: 18px;
    }
    
    .logo-text {
      font-size: 38px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.4px;
      font-family: "Nanum Pen Script", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1;
    }
    
    .logo-tagline {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }
    
    .auth-title {
      font-size: 26px;
      font-weight: 600;
      text-align: left;
      margin-bottom: 0;
      color: var(--text);
      line-height: 34px;
    }
    
    .auth-subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: left;
      margin-bottom: 0;
      line-height: 21px;
    }
    
    .email-state {
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
    }
    
    .email-state-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .form-container {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }
    
    .form-container form {
      display: grid;
      gap: 16px;
      width: 100%;
    }
    
    .form-container .error-message {
      margin-bottom: 0;
    }
    
    .form-group {
      margin-bottom: 0;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 21px;
    }
    
    .form-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      transition: all 0.15s ease;
      outline: none;
      height: 42px;
      line-height: 21px;
    }
    
    .form-input::placeholder {
      color: var(--muted);
    }
    
    .form-input:focus {
      border-color: var(--line-hover);
      box-shadow: 0 0 0 3px rgba(255, 91, 127, 0.12);
    }

    .form-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* OTP Input */
    .otp-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 0;
    }
    
    .otp-input {
      width: 46px;
      height: 42px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: all 0.15s ease;
    }
    
    .otp-input:focus {
      border-color: var(--line-hover);
      box-shadow: 0 0 0 3px rgba(255, 91, 127, 0.12);
    }
    
    .otp-input:disabled {
      opacity: 0.6;
    }
    
    .btn-primary {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--card);
      background: var(--text);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      line-height: 21px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(31, 31, 31, 0.2);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn-secondary {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 8px;
      height: 40px;
      line-height: 21px;
    }
    
    .btn-secondary:hover {
      border-color: var(--line-hover);
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(31, 31, 31, 0.15);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .features-list {
      display: none;
    }
    
    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    
    
    /* States */
    .email-state, .code-state, .success-state {
      display: none;
    }
    
    .email-state.active {
      display: flex;
    }
    
    .code-state.active {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .success-state {
      width: 100%;
      text-align: center;
    }

    .success-state.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    
    /* Success State */
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0;
      background: var(--card);
      border-radius: 50%;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text);
    }
    
    .success-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
      text-align: center;
    }
    
    .success-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 21px;
      text-align: center;
    }
    
    /* Error State */
    .error-message {
      display: none;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 0;
      text-align: left;
    }
    
    .error-message.active {
      display: block;
      margin-bottom: 16px;
    }
    
    /* Email display */
    .email-display {
      text-align: center;
      margin-bottom: 0;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    
    .email-display-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    
    .email-display-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    
    
    /* Trial badge */
    .trial-badge {
      display: none;
    }
    
    .resend-text {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      line-height: 21px;
    }

    .code-state form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .resend-text a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(31, 31, 31, 0.2);
      cursor: pointer;
    }
    
    .resend-text a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-text">Plukrr</div>
        <div class="logo-tagline">Extract any design with AI</div>
      </div>
      
      <!-- Email State -->
      <div class="email-state active" id="emailState">
        <div class="email-state-header">
          <h1 class="auth-title">Welcome</h1>
        </div>
        
        <div class="form-container">
          <div class="error-message" id="emailError"></div>
          
          <form id="emailForm">
            <div class="form-group">
              <p class="form-label">Email</p>
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="Email"
                required
                autocomplete="email"
              />
            </div>
            
            <div class="form-actions">
              <button type="submit" class="btn-primary" id="sendCodeBtn">
                <span class="btn-text">Continue</span>
              </button>
            </div>
          </form>
        </div>
      </div>
      
      <!-- Code Verification State -->
      <div class="code-state" id="codeState">
        <h1 class="auth-title">Enter Code</h1>
        <p class="auth-subtitle">
          We sent a 6-digit code to your email
        </p>
        
        <div class="email-display">
          <div class="email-display-label">Sent to</div>
          <div class="email-display-value" id="emailDisplay">your@email.com</div>
        </div>
        
        <div class="error-message" id="codeError"></div>
        
        <form id="codeForm">
          <div class="otp-container" id="otpContainer">
            <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*" />
          </div>
          
          <button type="submit" class="btn-primary" id="verifyCodeBtn">
            <span class="btn-text">Verify & Sign In</span>
          </button>
        </form>
        
        <div class="resend-text">
          Didn't receive it? <a id="resendLink">Resend code</a>
        </div>
        
        <button class="btn-secondary" id="changeEmailBtn">← Use different email</button>
      </div>
      
      <!-- Success State -->
      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <h2 class="success-title">You're in!</h2>
        <p class="success-text">
          Successfully signed in. Redirecting...
        </p>
      </div>
      
    </div>
  </div>
  
  <script src="config.js"></script>
  <script src="auth-service.js"></script>
  <script src="trial-service.js"></script>
  <script src="auth.js"></script>
</body>
</html>
